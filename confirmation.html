<!doctype html>
<html lang="fr-ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big Burger Legacy | Confirmation</title>
    <link rel="stylesheet" href="css/style.css" />
    <script
      src="https://kit.fontawesome.com/97577d643c.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="shortcut icon"
      href="media/logo-site-web.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="page-confirmation">
          <a href="index.html"
            ><img
              src="media/logo-site-web.png"
              alt="logo du site big burger legacy"
              class="logo"
          /></a>
        </div>
      </div>
    </header>
    <main>
      <section>
        <div class="container">
          <div class="confirmation-flex">
            <div class="confirmation-box">
              <div class="confirmation">
                <h1>Confirmation</h1>
              </div>
              <div class="msg-confirmation">
                <p>Votre réservation a bien été confirmé et cédulé</p>
                <p>Merci pour votre confiance!</p>
                <i
                  class="fa-solid fa-circle-check fa-4x"
                  style="color: rgb(26, 230, 0)"
                ></i>
              </div>
              <div class="continuer">
                <a href="index.html">Retour à la page d'accueil</a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <div class="container">
        <div class="footer1">
          <div class="realisation">
            <i class="fa-solid fa-arrow-right fa-2x"></i>
            <p>Réalisé par: Tristan Piché</p>
          </div>
          <div class="realisation1">
            <i class="fa-brands fa-instagram fa-2x"></i>
            <i class="fa-brands fa-facebook fa-2x"></i>
            <i class="fa-brands fa-tiktok fa-2x"></i>
            <i class="fa-brands fa-pinterest fa-2x"></i>
            <p>Réseaux Sociaux:</p>
          </div>
        </div>
        <div class="footer2">
          <p>Intégration Web 1 : TP3 Site web responsive</p>
          <p>Cégep de Trois-Rivières</p>
        </div>
      </div>
    </footer>
  </body>
</html>
